name: Release

on:
  push:
    tags: ["v*"]

env:
  REGISTRY: ghcr.io

jobs:
  codegen:
    name: Run codegen
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Run codegen
        run: cargo run -p cospan-codegen

      - name: Upload generated artifacts
        uses: actions/upload-artifact@v4
        with:
          name: generated
          path: |
            generated/
            crates/cospan-appview/src/db/generated/
            apps/web/src/lib/generated/

  build-and-push:
    name: Build and push Docker images
    needs: codegen
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - name: node
            dockerfile: crates/cospan-node/Dockerfile
            image: ghcr.io/cospan-dev/cospan-node
          - name: appview
            dockerfile: crates/cospan-appview/Dockerfile
            image: ghcr.io/cospan-dev/cospan-appview
          - name: web
            dockerfile: apps/web/Dockerfile
            image: ghcr.io/cospan-dev/cospan-web
    steps:
      - uses: actions/checkout@v4

      - name: Download generated artifacts
        uses: actions/download-artifact@v4
        with:
          name: generated

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ matrix.image }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
