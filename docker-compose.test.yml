services:
  test-db:
    image: postgres:17-alpine
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: cospan_test
      POSTGRES_USER: cospan
      POSTGRES_PASSWORD: cospan
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cospan -d cospan_test"]
      interval: 2s
      timeout: 2s
      retries: 10
