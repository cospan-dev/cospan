<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 40" fill="none">
  <!-- Cospan logo: wordmark + cospan diagram motif -->
  <!-- The cospan: two morphisms A→C←B meeting at apex C -->

  <!-- Morphism lines (the mathematical cospan structure) -->
  <line x1="8" y1="16" x2="22" y2="8" stroke="#6B8AE8" stroke-width="1" opacity="0.35" stroke-linecap="round"/>
  <line x1="38" y1="16" x2="24" y2="8" stroke="#6B8AE8" stroke-width="1" opacity="0.35" stroke-linecap="round"/>

  <!-- Schema nodes -->
  <circle cx="8" cy="16" r="2" fill="#6B8AE8" opacity="0.25"/>
  <circle cx="23" cy="7.5" r="2.5" fill="#6B8AE8" opacity="0.55"/>
  <circle cx="38" cy="16" r="2" fill="#6B8AE8" opacity="0.25"/>

  <!-- Wordmark -->
  <text x="2" y="32" font-family="'Inter', system-ui, -apple-system, sans-serif" font-size="18" font-weight="500" fill="#E4E4ED" letter-spacing="-0.03em">cospan</text>
</svg>
