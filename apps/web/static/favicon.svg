<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Cospan mark: the cospan diagram as a geometric icon -->
  <!-- Three vertices of a cospan: A→C←B, apex at top -->
  <rect width="32" height="32" rx="7" fill="#131320"/>

  <!-- Edges (morphism arrows) -->
  <path d="M8 23 L16 10" stroke="#6B8AE8" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <path d="M24 23 L16 10" stroke="#6B8AE8" stroke-width="2" stroke-linecap="round" opacity="0.6"/>

  <!-- Vertices -->
  <circle cx="8" cy="23" r="3.5" fill="#4A6BD4" opacity="0.5"/>
  <circle cx="24" cy="23" r="3.5" fill="#4A6BD4" opacity="0.5"/>
  <circle cx="16" cy="10" r="4.5" fill="#6B8AE8"/>
</svg>
