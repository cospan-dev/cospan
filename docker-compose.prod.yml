# Cospan Production Deployment
# Usage:
#   1. Copy .env.production.example to .env.production and fill in values
#   2. docker compose -f docker-compose.prod.yml up -d
#
# Images are pre-built and pushed to GHCR by the release workflow.
# Requires: Docker, ~1GB RAM, domain pointed at the server

services:
  # Reverse proxy with auto-TLS
  caddy:
    image: caddy:2-alpine
    container_name: cospan-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:?DOMAIN is required}
    volumes:
      - ./Caddyfile.prod:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - web
      - appview
      - node
    networks:
      - cospan

  # PostgreSQL
  db:
    image: postgres:17-alpine
    container_name: cospan-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: cospan
      POSTGRES_USER: cospan
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - pg-data:/var/lib/postgresql/data
      - ./scripts/init-tap-db.sh:/docker-entrypoint-initdb.d/init-tap-db.sh:ro
    ports:
      - "127.0.0.1:5432:5432"
    networks:
      - cospan
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cospan"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  # Redis
  redis:
    image: redis:7-alpine
    container_name: cospan-redis
    restart: unless-stopped
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - cospan
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 192M

  # panproto-vcs node server
  node:
    image: ghcr.io/cospan-dev/cospan-node:${COSPAN_VERSION:-latest}
    container_name: cospan-node
    restart: unless-stopped
    volumes:
      - node-data:/data
    environment:
      NODE_DID: ${NODE_DID:?NODE_DID is required}
      NODE_LISTEN: "0.0.0.0:3001"
      COSPAN_DATA_DIR: /data
      COSPAN_DEV_AUTH: "1"
    networks:
      - cospan
    deploy:
      resources:
        limits:
          memory: 512M

  # Tap: ATProto sync with full backfill
  # Discovers all repos with Tangled/Cospan records, downloads full history
  # from each PDS, then streams live events. The appview connects via WebSocket.
  tap:
    image: ghcr.io/bluesky-social/indigo/tap:latest
    container_name: cospan-tap
    restart: unless-stopped
    environment:
      TAP_DATABASE_URL: postgres://cospan:${POSTGRES_PASSWORD}@db:5432/tap
      TAP_BIND: ":2480"
      TAP_SIGNAL_COLLECTION: sh.tangled.actor.profile
      TAP_COLLECTION_FILTERS: "sh.tangled.*,dev.cospan.*"
      TAP_RELAY_URL: https://relay1.us-east.bsky.network
      TAP_DISABLE_ACKS: "true"
      TAP_LOG_LEVEL: info
      TAP_RESYNC_PARALLELISM: "1"
      TAP_FIREHOSE_PARALLELISM: "10"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - cospan
    deploy:
      resources:
        limits:
          memory: 1536M
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:2480/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 300s

  # ATProto AppView
  appview:
    image: ghcr.io/cospan-dev/cospan-appview:${COSPAN_VERSION:-latest}
    container_name: cospan-appview
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://cospan:${POSTGRES_PASSWORD}@db:5432/cospan
      REDIS_URL: redis://redis:6379
      JETSTREAM_URL: wss://jetstream2.us-east.bsky.network/subscribe
      TAP_URL: ws://tap:2480/channel
      APPVIEW_LISTEN: "0.0.0.0:3000"
      PUBLIC_URL: https://${DOMAIN:?DOMAIN is required}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      tap:
        condition: service_started
    networks:
      - cospan
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # SvelteKit frontend
  web:
    image: ghcr.io/cospan-dev/cospan-web:${COSPAN_VERSION:-latest}
    container_name: cospan-web
    restart: unless-stopped
    environment:
      PORT: "3000"
      APPVIEW_URL: http://appview:3000
    depends_on:
      appview:
        condition: service_healthy
    networks:
      - cospan
    deploy:
      resources:
        limits:
          memory: 256M

volumes:
  caddy-data:
  caddy-config:
  pg-data:
  redis-data:
  node-data:

networks:
  cospan:
    driver: bridge
